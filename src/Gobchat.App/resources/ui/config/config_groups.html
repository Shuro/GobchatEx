<div class="gx-page-wrap">
<div class="gob-config-page gx-page" id="cp-groups">

    <div class="gx-page_head">
        <h1 data-gob-locale-text="config.groups.page.name"></h1>
        <p data-gob-locale-text="config.groups.page.desc"></p>
    </div>

    <section class="gx-section gx-section--pad">
        <label class="gx-row gx-row--toggle" style="border-bottom:none;padding:0">
            <div class="gx-row_label">
                <div class="gx-row_title"
                     data-gob-locale-text="config.groups.ckb.updatechat"
                     data-gob-locale-tooltip="config.groups.ckb.updatechat.tooltip"></div>
            </div>
            <input class="gx-tgl" type="checkbox"
                   id="cp-groups_updateChat"
                   data-gob-configkey="behaviour.groups.updateChat"
                   data-gob-locale-tooltip="config.groups.ckb.updatechat.tooltip" />
        </label>
    </section>

    <div class="gx-eyebrow" data-gob-locale-text="config.groups.section.custom"
         data-gob-search-alias="highlight friends FC free company Freunde Hervorhebung name color"></div>

    <div class="gx-inline" style="margin-bottom:12px">
        <button id="cp-groups_addnewgrouptop" class="gx-ghost" type="button">
            <i class="fa fa-plus"></i>
            <span data-gob-locale-text="config.groups.tbl.group.action.add"></span>
        </button>
    </div>

    <!-- Custom groups: editable, numbered 1..n, reorderable. Native collapsible cards (a header click
         toggles .is-open on the entry; config_groups.ts wires it). Styled via .gx-group-accordion. -->
    <div id="cp-groups_group-table" class="gx-group-accordion">
    </div>

    <div class="gx-inline" style="margin-top:12px">
        <button id="cp-groups_addnewgroupbot" class="gx-ghost" type="button">
            <i class="fa fa-plus"></i>
            <span data-gob-locale-text="config.groups.tbl.group.action.add"></span>
        </button>
    </div>

    <!-- Premade groups: the 7 built-in FFXIV friend-list symbol groups, a locked reference numbered
         1-7. Not editable / reorderable / deletable here; only their colours can be changed. -->
    <div class="gx-eyebrow" data-gob-locale-text="config.groups.section.premade" style="margin-top:20px"></div>
    <div id="cp-groups_ffgroup-table" class="gx-group-accordion">
    </div>

    <template id="cp-groups_template_group-table_entry">
        <div data-gob-entryid class="gx-group">
            <h4 class="gx-group_head">
                <span class="gx-group_title">
                    <svg class="gx-group_chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                    <span class="js-header_index gx-group_index"></span>
                    <span class="js-header_sep">.&nbsp;<span data-gob-locale-text="config.groups.tbl.group.entry.naming"></span>:&nbsp;</span>
                    <span class="js-header_name"></span>
                </span>
                <span class="gx-group_head-actions">
                    <input class="gx-tgl js-entry-active" type="checkbox"
                           data-gob-locale-tooltip="config.groups.tbl.group.entry.active" />
                    <button class="gx-icon gx-icon--ghost js-group-up" type="button"
                            data-gob-locale-tooltip="config.groups.tbl.group.entry.moveup.tooltip">
                        <i class="fa fa-arrow-up"></i>
                    </button>
                    <button class="gx-icon gx-icon--ghost js-group-down" type="button"
                            data-gob-locale-tooltip="config.groups.tbl.group.entry.movedown.tooltip">
                        <i class="fa fa-arrow-down"></i>
                    </button>
                    <button class="gx-icon gx-icon--ghost gx-icon--danger js-delete-entry" type="button"
                            data-gob-locale-tooltip="config.main.button.delete.tooltip">
                        <i class="fa fa-trash"></i>
                    </button>
                </span>
            </h4>
            <div class="gx-group_body">
                <p class="gx-group_info js-mode-noncustom js-ffgroup-icon" data-gob-locale-id-text="config.groups.tbl.group.entry.ffgroup.info"></p>

                <div class="gx-row gx-row--block js-mode-custom">
                    <label class="gx-flabel" data-gob-locale-text="config.groups.tbl.group.entry.name"></label>
                    <div class="gx-inline">
                        <input class="gx-in js-txt-name" type="text" />
                        <button class="gx-icon gx-icon--ghost js-txt-name_reset" type="button"></button>
                    </div>
                </div>

                <div class="gx-group_colors js-color-selections">
                    <div class="gx-group_color-row">
                        <label class="gx-flabel" data-gob-locale-text="config.groups.tbl.group.entry.sender.forground" data-gob-locale-tooltip="config.groups.tbl.group.entry.sender.forground.title"></label>
                        <div class="gx-inline">
                            <input class="js-sender-fgcolor" type="text" />
                            <button class="gx-icon gx-icon--ghost js-sender-fgcolor_reset" type="button"></button>
                        </div>
                    </div>
                    <div class="gx-group_color-row">
                        <label class="gx-flabel" data-gob-locale-text="config.groups.tbl.group.entry.sender.background" data-gob-locale-tooltip="config.groups.tbl.group.entry.sender.background.title"></label>
                        <div class="gx-inline">
                            <input class="js-sender-bgcolor" type="text" />
                            <button class="gx-icon gx-icon--ghost js-sender-bgcolor_reset" type="button"></button>
                        </div>
                    </div>
                    <div class="gx-group_color-row">
                        <label class="gx-flabel" data-gob-locale-text="config.groups.tbl.group.entry.message.background" data-gob-locale-tooltip="config.groups.tbl.group.entry.message.background.title"></label>
                        <div class="gx-inline">
                            <input class="js-msg-bgcolor" type="text" />
                            <button class="gx-icon gx-icon--ghost js-msg-bgcolor_reset" type="button"></button>
                        </div>
                    </div>
                </div>

                <div class="gx-row gx-row--block js-mode-custom">
                    <label class="gx-flabel" data-gob-locale-text="config.groups.tbl.group.entry.trigger" data-gob-locale-tooltip="config.groups.tbl.group.entry.trigger.tooltip"></label>
                    <div class="gx-tags js-group-triggers" data-gob-locale-tooltip="config.groups.tbl.group.entry.trigger.tooltip"></div>
                </div>
            </div>
        </div>
    </template>
</div>
</div>

<script defer type="module" src="config_groups.js"></script>
