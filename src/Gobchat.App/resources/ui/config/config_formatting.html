<div class="gx-page-wrap">
<div class="gob-config-page gx-page" id="cp-formatting">

    <div class="gx-page_head">
        <h1 data-gob-locale-text="config.formatting.page.name"></h1>
        <p data-gob-locale-text="config.formatting.page.desc"></p>
    </div>

    <!-- Chat Overlay Window (per-profile: position/size + chat background) -->
    <div class="gx-eyebrow" data-gob-locale-text="config.app.position.lable"></div>
    <section class="gx-section gx-section--pad">
        <div class="gx-grid gx-grid--4" style="margin-bottom:16px">
            <div>
                <label class="gx-flabel" data-gob-locale-text="config.app.position.x" for="cp-app_frame_x"></label>
                <input class="gx-in" type="number" id="cp-app_frame_x" data-gob-configkey="behaviour.frame.chat.position.x" />
            </div>
            <div>
                <label class="gx-flabel" data-gob-locale-text="config.app.position.y" for="cp-app_frame_y"></label>
                <input class="gx-in" type="number" id="cp-app_frame_y" data-gob-configkey="behaviour.frame.chat.position.y" />
            </div>
            <div>
                <label class="gx-flabel" data-gob-locale-text="config.app.position.width" for="cp-app_frame_width"></label>
                <input class="gx-in" type="number" min="200" id="cp-app_frame_width" data-gob-configkey="behaviour.frame.chat.size.width" />
            </div>
            <div>
                <label class="gx-flabel" data-gob-locale-text="config.app.position.height" for="cp-app_frame_height"></label>
                <input class="gx-in" type="number" min="200" id="cp-app_frame_height" data-gob-configkey="behaviour.frame.chat.size.height" />
            </div>
        </div>
        <div class="gx-row" style="border-top:1px solid var(--border);padding-top:14px">
            <div class="gx-row_label">
                <div>
                    <div class="gx-row_title"
                         data-gob-locale-text="config.app.chatbox.backgroundcolor"
                         data-gob-locale-tooltip="config.app.chatbox.backgroundcolor.tooltip"></div>
                    <div class="gx-row_desc" data-gob-locale-text="config.app.chatbox.backgroundcolor.desc"></div>
                </div>
            </div>
            <div class="gx-row_control gx-inline">
                <input type="text"
                       id="cp-app_chat-history_backgroundcolor"
                       data-gob-configkey="style.chat-history.background-color"
                       data-gob-locale-tooltip="config.app.chatbox.backgroundcolor.tooltip" />
                <button id="cp-app_chat-history_backgroundcolor_reset" class="gx-icon" type="button"></button>
            </div>
        </div>
        <div class="gx-row">
            <div class="gx-row_label">
                <div>
                    <div class="gx-row_title"
                         data-gob-locale-text="config.app.chatbox.opacity"
                         data-gob-locale-tooltip="config.app.chatbox.opacity.tooltip"></div>
                    <div class="gx-row_desc" data-gob-locale-text="config.app.chatbox.opacity.desc"></div>
                </div>
            </div>
            <div class="gx-row_control gx-inline">
                <input type="range" min="0" max="100" step="1" class="gx-rng" style="width:150px"
                       id="cp-app_chat-history_backgroundopacity"
                       data-gob-configkey="style.chat-history.background-opacity"
                       data-gob-locale-tooltip="config.app.chatbox.opacity.tooltip" />
                <span class="gx-muted" id="cp-app_chat-history_backgroundopacity_value"></span>
                <button id="cp-app_chat-history_backgroundopacity_reset" class="gx-icon" type="button"></button>
            </div>
        </div>
    </section>

    <!-- Fonts -->
    <div class="gx-eyebrow" data-gob-locale-text="config.formatting.fonts.label"></div>
    <section class="gx-section gx-section--pad">
        <!-- Tab style | Chat density (mutually-exclusive buttons, FFXIV Modern theme) -->
        <div class="gx-grid gx-grid--2 gx-fmt-grid" style="margin-top:0">
            <div>
                <label class="gx-flabel" style="display:flex;align-items:center;gap:8px"
                       data-gob-locale-tooltip="config.formatting.tabstyle.tooltip">
                    <span data-gob-locale-text="config.formatting.tabstyle"></span>
                    <span class="gx-badge-new" data-gob-locale-text="config.mentions.player.badge"></span>
                </label>
                <div class="gx-scheme js-tab-style" role="group"
                     data-gob-locale-tooltip="config.formatting.tabstyle.tooltip">
                    <button type="button" class="gx-scheme_btn js-seg-btn" data-value="underline"
                            data-gob-locale-text="config.formatting.tabstyle.underline"></button>
                    <button type="button" class="gx-scheme_btn js-seg-btn" data-value="pills"
                            data-gob-locale-text="config.formatting.tabstyle.pills"></button>
                    <button type="button" class="gx-scheme_btn js-seg-btn" data-value="angled"
                            data-gob-locale-text="config.formatting.tabstyle.angled"></button>
                </div>
            </div>
            <div>
                <label class="gx-flabel" style="display:flex;align-items:center;gap:8px"
                       data-gob-locale-tooltip="config.formatting.chatdensity.tooltip">
                    <span data-gob-locale-text="config.formatting.chatdensity"></span>
                    <span class="gx-badge-new" data-gob-locale-text="config.mentions.player.badge"></span>
                </label>
                <div class="gx-scheme js-chat-density" role="group"
                     data-gob-locale-tooltip="config.formatting.chatdensity.tooltip">
                    <button type="button" class="gx-scheme_btn js-seg-btn" data-value="dense-plus"
                            data-gob-locale-text="config.formatting.chatdensity.dense-plus"></button>
                    <button type="button" class="gx-scheme_btn js-seg-btn" data-value="dense"
                            data-gob-locale-text="config.formatting.chatdensity.dense"></button>
                    <button type="button" class="gx-scheme_btn js-seg-btn" data-value="breathable"
                            data-gob-locale-text="config.formatting.chatdensity.breathable"></button>
                    <button type="button" class="gx-scheme_btn js-seg-btn" data-value="breathable-plus"
                            data-gob-locale-text="config.formatting.chatdensity.breathable-plus"></button>
                </div>
            </div>
        </div>

        <div class="gx-row gx-row--block">
            <label class="gx-flabel"
                   data-gob-locale-text="config.formatting.fontfamily"
                   data-gob-locale-tooltip="config.formatting.fontfamily.tooltip"
                   for="cp-formatting_chat_font-family"></label>
            <div class="gx-inline">
                <div class="gx-sel-wrap" style="flex:1">
                    <select class="gx-sel gx-sel--block"
                            id="cp-formatting_chat_font-family"
                            data-gob-configkey="style.channel.base.general.font-family"
                            data-gob-locale-tooltip="config.formatting.fontfamily.tooltip">
                        <!-- Each option previews in its own font (style = value). The original 5 keep
                             their exact value strings so saved selections still match. The math-glyph
                             fallback (Noto Sans Math) is added at render time by StyleBuilder, so it is
                             intentionally NOT baked into these values. -->
                        <option style="font-family:'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" value="'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">IBM Plex Sans</option>
                        <option style="font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" value="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">System sans-serif</option>
                        <option style="font-family:Verdana, Geneva, sans-serif" value="Verdana, Geneva, sans-serif">Verdana</option>
                        <option style="font-family:'Noto Sans', sans-serif" value="'Noto Sans', sans-serif">Noto Sans</option>
                        <option style="font-family:Lexend, sans-serif" value="Lexend, sans-serif">Lexend</option>
                        <option style="font-family:OpenDyslexic, sans-serif" value="OpenDyslexic, sans-serif">OpenDyslexic</option>
                        <option style="font-family:'Times New Roman', Times, serif" value="'Times New Roman', Times, serif">Times New Roman</option>
                        <option style="font-family:Georgia, 'Times New Roman', Times, serif" value="Georgia, 'Times New Roman', Times, serif">Georgia</option>
                        <option style="font-family:Cambria, Georgia, serif" value="Cambria, Georgia, serif">Cambria</option>
                        <option style="font-family:'IBM Plex Mono', 'Courier New', monospace" value="'IBM Plex Mono', 'Courier New', monospace">IBM Plex Mono</option>
                    </select>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                </div>
                <button class="gx-icon gx-icon--ghost" id="cp-formatting_chat_font-family_reset" type="button"></button>
            </div>
        </div>

        <!-- Font size | Tab font size (both 8–24) -->
        <div class="gx-grid gx-grid--2 gx-fmt-grid">
            <div>
                <label class="gx-flabel"
                       data-gob-locale-text="config.formatting.chathistory.fontsize.label"
                       data-gob-locale-tooltip="config.formatting.chathistory.fontsize.label.tooltip"></label>
                <div class="gx-inline">
                    <input class="gx-in" type="number" min="8" max="24" style="flex:0 0 72px"
                           id="cp-formatting_chat-history_font-size"
                           data-gob-configkey="style.chat-history.font-size"
                           data-gob-locale-tooltip="config.formatting.chathistory.fontsize.label.tooltip" />
                    <input class="gx-rng" type="range" min="8" max="24" step="1" style="flex:1 1 auto"
                           id="cp-formatting_chat-history_font-size_slider"
                           data-gob-locale-tooltip="config.formatting.chathistory.fontsize.label.tooltip" />
                    <button class="gx-icon gx-icon--ghost" id="cp-formatting_chat-history_font-size_reset" type="button"></button>
                </div>
            </div>
            <div>
                <label class="gx-flabel"
                       data-gob-locale-text="config.formatting.chatui.fontsize.label"
                       data-gob-locale-tooltip="config.formatting.chatui.fontsize.label.tooltip"></label>
                <div class="gx-inline">
                    <input class="gx-in" type="number" min="8" max="24" style="flex:0 0 72px"
                           id="cp-formatting_chat-ui_font-size"
                           data-gob-configkey="style.chatui.font-size"
                           data-gob-locale-tooltip="config.formatting.chatui.fontsize.label.tooltip" />
                    <input class="gx-rng" type="range" min="8" max="24" step="1" style="flex:1 1 auto"
                           id="cp-formatting_chat-ui_font-size_slider"
                           data-gob-locale-tooltip="config.formatting.chatui.fontsize.label.tooltip" />
                    <button class="gx-icon gx-icon--ghost" id="cp-formatting_chat-ui_font-size_reset" type="button"></button>
                </div>
            </div>
        </div>

    </section>

    <!-- Roleplay colours -->
    <div class="gx-eyebrow" data-gob-locale-text="config.formatting.tbl.color.name"></div>
    <section class="gx-section gx-section--pad">
        <table class="gx-color-table" id="cp-formatting_color-table">
            <thead>
                <tr>
                    <th data-gob-locale-text="config.formatting.tbl.color.header.name"></th>
                    <th data-gob-locale-text="config.formatting.tbl.color.header.color"></th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>

        <template id="cp-formatting_template_color-table_entry">
            <tr>
                <td>
                    <label class="js-label"></label>
                </td>
                <td>
                    <div class="gx-inline">
                        <input class="js-color-selector" type="text" />
                        <button class="gx-icon gx-icon--ghost js-color-reset" type="button"></button>
                    </div>
                </td>
            </tr>
        </template>
    </section>

    <!-- Segment detection -->
    <div class="gx-eyebrow gx-eyebrow--gap" data-gob-locale-text="config.formatting.tbl.segment.name"></div>
    <section class="gx-section gx-section--pad">
        <div class="gx-toggle-grid">
            <label>
                <span data-gob-locale-text="config.formatting.ckb.emoteinsay"
                      data-gob-locale-tooltip="config.formatting.ckb.emoteinsay.tooltip"></span>
                <input class="gx-tgl" type="checkbox"
                       id="cp-formatting_autodetectemote"
                       data-gob-configkey="behaviour.chat.autodetectEmoteInSay"
                       data-gob-locale-tooltip="config.formatting.ckb.emoteinsay.tooltip" />
            </label>
            <label>
                <span style="display:flex;align-items:center;gap:8px">
                    <span data-gob-locale-text="config.formatting.ckb.emoteinparty"
                          data-gob-locale-tooltip="config.formatting.ckb.emoteinparty.tooltip"></span>
                    <span class="gx-badge-new" data-gob-locale-text="config.mentions.player.badge"></span>
                </span>
                <input class="gx-tgl" type="checkbox"
                       id="cp-formatting_autodetectemoteparty"
                       data-gob-configkey="behaviour.chat.autodetectEmoteInParty"
                       data-gob-locale-tooltip="config.formatting.ckb.emoteinparty.tooltip" />
            </label>
        </div>
    </section>

    <!-- Three fixed segment sections (Say / Emote / OOC, in that order). Each lists the locked
         baked-in marker pairs (toggle only) plus any user-added custom pairs. One start and one
         end token per pair (stored as length-1 arrays). config_formatting.ts fills the lists. -->
    <div class="gx-eyebrow" data-gob-locale-text="main.chat.segment.type.say"></div>
    <section class="gx-section">
        <div class="js-segment-list" data-segment-type="SAY"></div>
        <div class="gx-row" style="border-bottom:none;justify-content:flex-start">
            <button class="gx-ghost js-segment-add" type="button" data-segment-type="SAY">
                <i class="fa fa-plus"></i>
                <span data-gob-locale-text="config.formatting.segment.addcustom"></span>
            </button>
        </div>
    </section>

    <div class="gx-eyebrow" data-gob-locale-text="main.chat.segment.type.emote"></div>
    <section class="gx-section">
        <div class="js-segment-list" data-segment-type="EMOTE"></div>
        <div class="gx-row" style="border-bottom:none;justify-content:flex-start">
            <button class="gx-ghost js-segment-add" type="button" data-segment-type="EMOTE">
                <i class="fa fa-plus"></i>
                <span data-gob-locale-text="config.formatting.segment.addcustom"></span>
            </button>
        </div>
    </section>

    <div class="gx-eyebrow" data-gob-locale-text="main.chat.segment.type.ooc"></div>
    <section class="gx-section">
        <div class="js-segment-list" data-segment-type="OOC"></div>
        <div class="gx-row" style="border-bottom:none;justify-content:flex-start">
            <button class="gx-ghost js-segment-add" type="button" data-segment-type="OOC">
                <i class="fa fa-plus"></i>
                <span data-gob-locale-text="config.formatting.segment.addcustom"></span>
            </button>
        </div>
    </section>

    <!-- Locked (baked-in) pair: the token pair shown read-only + an on/off toggle. -->
    <template id="cp-formatting_template_segment_locked">
        <div data-gob-entryid class="gx-row">
            <div class="gx-row_label">
                <span class="gx-row_title js-pair"></span>
                <span class="js-unicode" style="color:var(--ink-3);font-size:11px"></span>
            </div>
            <input class="gx-tgl js-entry-active" type="checkbox"
                   data-gob-locale-tooltip="config.formatting.tbl.segment.entry.active" />
        </div>
    </template>

    <!-- Custom pair: editable start/end token + on/off toggle + delete. -->
    <template id="cp-formatting_template_segment_custom">
        <div data-gob-entryid class="gx-row">
            <div class="gx-inline" style="flex:1 1 auto;min-width:0">
                <input class="gx-in js-start-token" type="text" style="flex:0 1 130px" />
                <span style="color:var(--ink-3)">…</span>
                <input class="gx-in js-end-token" type="text" style="flex:0 1 130px" />
                <span class="js-unicode" style="color:var(--ink-3);font-size:11px"></span>
            </div>
            <div class="gx-inline" style="flex:0 0 auto">
                <input class="gx-tgl js-entry-active" type="checkbox"
                       data-gob-locale-tooltip="config.formatting.tbl.segment.entry.active" />
                <button class="gx-icon gx-icon--ghost gx-icon--danger js-delete-entry" type="button"
                        data-gob-locale-tooltip="config.main.button.delete.tooltip">
                    <i class="fa fa-trash"></i>
                </button>
            </div>
        </div>
    </template>
</div>
</div>

<script defer type="module" src="config_formatting.js"></script>
