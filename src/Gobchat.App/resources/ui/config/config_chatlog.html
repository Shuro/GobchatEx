<div class="gx-page-wrap">
<div class="gob-config-page gx-page" id="cp-chatlog">

    <div class="gx-page_head">
        <h1 data-gob-locale-text="config.chatlog.page.name"></h1>
        <p data-gob-locale-text="config.chatlog.page.desc"></p>
    </div>

    <div class="gx-eyebrow" data-gob-locale-text="config.chatlog.settings.label"></div>
    <section class="gx-section">
        <label class="gx-row gx-row--toggle">
            <div class="gx-row_label">
                <div>
                    <div class="gx-row_title"
                         data-gob-locale-text="config.chatlog.active"
                         data-gob-locale-tooltip="config.chatlog.active.tooltip"></div>
                    <div class="gx-row_desc" data-gob-locale-text="config.chatlog.active.desc"></div>
                </div>
            </div>
            <input class="gx-tgl" type="checkbox"
                   id="cp-chatlog_active"
                   data-gob-configkey="behaviour.chatlog.active"
                   data-gob-locale-tooltip="config.chatlog.active.tooltip" />
        </label>

        <label class="gx-row gx-row--toggle">
            <div class="gx-row_label">
                <div>
                    <div class="gx-row_title"
                         data-gob-locale-text="config.chatlog.characterfolders"
                         data-gob-locale-tooltip="config.chatlog.characterfolders.tooltip"></div>
                    <div class="gx-row_desc" data-gob-locale-text="config.chatlog.characterfolders.desc"></div>
                </div>
            </div>
            <input class="gx-tgl" type="checkbox"
                   id="cp-chatlog_characterfolders"
                   data-gob-configkey="behaviour.chatlog.characterfolders"
                   data-gob-locale-tooltip="config.chatlog.characterfolders.tooltip" />
        </label>

        <div class="gx-row gx-row--block">
            <label class="gx-flabel"
                   data-gob-locale-text="config.chatlog.path"
                   data-gob-locale-tooltip="config.chatlog.path.tooltip"></label>
            <div class="gx-inline">
                <input class="gx-in gx-in--mono" type="text"
                       id="cp-chatlog_path"
                       data-gob-configkey="behaviour.chatlog.path"
                       data-gob-locale-tooltip="config.chatlog.path.tooltip" />
                <button class="gx-icon" id="cp-chatlog_path_select"
                        type="button" data-gob-locale-tooltip="config.chatlog.pathselect.tooltip">
                    <i class="fas fa-folder-open"></i>
                </button>
                <button class="gx-icon gx-icon--ghost" id="cp-chatlog_path_reset" type="button"></button>
            </div>
        </div>

        <div class="gx-row gx-row--block">
            <label class="gx-flabel"
                   data-gob-locale-text="config.chatlog.format"
                   data-gob-locale-tooltip="config.chatlog.format.tooltip"></label>
            <input class="gx-in gx-in--mono" type="text" style="margin-bottom:8px"
                   id="cp-chatlog_format"
                   data-gob-configkey="behaviour.chatlog.format"
                   data-gob-locale-tooltip="config.chatlog.format.tooltip" />
            <div class="gx-sel-wrap" style="display:block">
                <select class="gx-sel gx-sel--block"
                        id="cp-chatlog_format_selector"
                        data-gob-configkey="behaviour.chatlog.format"
                        data-gob-locale-tooltip="config.chatlog.format.tooltip">
                    <option value="" data-gob-locale-text="config.chatlog.format.selector.custom"></option>
                    <option value="{channel} [{date} {time-full}] {sender}: {message}"
                            data-gob-locale-text="config.chatlog.format.selector.default"></option>
                    <option value="{channel} [{date} {time}] {sender}: {message}"
                            data-gob-locale-text="config.chatlog.format.selector.short"></option>
                    <option value="{channel} [{date} {time-full}] {sender}:{break}{message}{break}"
                            data-gob-locale-text="config.chatlog.format.selector.newline"></option>
                    <option value="{channel-padl} [{date} {time-full}] {sender}: {message}"
                            data-gob-locale-text="config.chatlog.format.selector.padleft"></option>
                    <option value="{channel-padr} [{date} {time-full}] {sender}: {message}"
                            data-gob-locale-text="config.chatlog.format.selector.padright"></option>
                    <option value="[{time-short}] {sender}: {message}"
                            data-gob-locale-text="config.chatlog.format.selector.compact"></option>
                    <option value="[{time-short}]{sender-cha} {message}"
                            data-gob-locale-text="config.chatlog.format.selector.ingame"></option>
                </select>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </div>
            <div class="gx-format-preview">
                <span class="gx-format-preview_label" data-gob-locale-text="config.chatlog.preview.label"></span>
                <code class="gx-format-preview_sample" id="cp-chatlog_format_preview"></code>
            </div>
        </div>
    </section>

    <div class="gx-eyebrow" data-gob-locale-text="config.chatlog.tbl.chatlog.label"></div>
    <section class="gx-section gx-section--pad">
        <div class="gx-checklist-cols">
            <table class="gx-checklist" id="cp-chatlog_table">
                <thead>
                    <tr>
                        <th data-gob-locale-text="config.chatlog.tbl.chatlog.name"></th>
                        <th data-gob-locale-text="config.chatlog.tbl.chatlog.log"></th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
            <table class="gx-checklist" id="cp-chatlog_table-2">
                <thead>
                    <tr>
                        <th data-gob-locale-text="config.chatlog.tbl.chatlog.name"></th>
                        <th data-gob-locale-text="config.chatlog.tbl.chatlog.log"></th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </section>

    <template id="cp-chatlog_template_table_entry">
        <tr>
            <td>
                <label class="js-label"></label>
            </td>
            <td>
                <input class="gx-tgl js-checkbox" type="checkbox" />
            </td>
        </tr>
    </template>
</div>
</div>

<script defer type="module" src="config_chatlog.js"></script>
