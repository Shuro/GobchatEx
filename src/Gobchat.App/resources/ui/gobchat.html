<html class="chat-frame" data-tab-style="underline" data-chat-density="dense">
<head>
    <meta charset="utf-8" />

    <link rel="stylesheet" href="/lib/jquery-ui-1.14.2.css">
    <link rel="stylesheet" href="/styles/base.css">
    <!-- The chat theme (default: styles/ffxiv_modern_chat.css) is injected at runtime by
         gobchat.ts via gobStyles.activateStyles(style.theme, ...), right before
         #gob_autogenerated_stylesheet — so it layers over base.css and the config-generated
         per-channel colours/font still win. Do NOT add a static theme <link> here or it would
         override the selected theme. -->

    <script defer src="/lib/jquery-4.0.0.js"></script>
    <script defer src="/lib/jquery-ui-1.14.2.js"></script>
    <script defer src="/lib/lodash.js"></script>
    <script defer src="/lib/fontawesome/js/all.js"></script>

    <style id="gob_autogenerated_stylesheet"></style>
    <script defer type="module" src="gobchat.js"></script>
    <!-- gobchat-test.js (manual chat test harness) is injected at runtime in Debug builds only,
         on demand from the Debug settings page; see GobchatBrowserAPI.InjectTestHarness (#if DEBUG). -->
</head>
<body>
    <div class="gob-chat">

        <!-- Top toolbar doubles as the move handle. The grip + accent ring only
             appear while the overlay is unlocked (html.gob-document--resize). -->
        <div class="gob-chat-toolbar gob-chat-toolbar--top">
            <span class="gob-chat-toolbar_grip" aria-hidden="true" title="Drag to move">
                <i class="fas fa-grip-vertical"></i>
            </span>
            <div class="gob-chat-tabbar">
                <button class="gob-chat-tabbar_button gob-chat-tabbar_button--left" title="Scroll tabs left"><i class="fas fa-arrow-left"></i></button>
                <div class="gob-chat-tabbar_content"></div>
                <button class="gob-chat-tabbar_button gob-chat-tabbar_button--right" title="Scroll tabs right"><i class="fas fa-arrow-right"></i></button>
            </div>
            <span class="gob-chat-toolbar_sep" aria-hidden="true"></span>
            <button class="gob-chat-toolbar_icon-button" id="gob_show_config" title="Settings"><i class="fas fa-cog"></i></button>
            <!-- Two icons (closed + open eye); base.css shows one or the other off the root
                 .gob-chat--reveal-hidden state. A single icon can't be swapped in JS because Font
                 Awesome's all.js replaces the <i> with an <svg> at load. -->
            <button class="gob-chat-toolbar_icon-button" id="gob_toggle_reveal_hidden" title="Show hidden messages"><i class="fas fa-eye-slash gob-eye--closed"></i><i class="fas fa-eye gob-eye--open"></i></button>
            <button class="gob-chat-toolbar_icon-button" id="gob_toggle_search" title="Search"><i class="fas fa-search"></i></button>
            <button class="gob-chat-toolbar_icon-button" id="gob_toggle_pin" title="Lock / unlock position &amp; size"><i class="fas fa-thumbtack"></i></button>
        </div>

        <div class="gob-chat_history">
        </div>

        <!-- Search bar. gobChatManager.hideSearch() / toggleSearch() (wired to
             #gob_toggle_search) add/remove .is-hidden on this toolbar. -->
        <div class="gob-chat-toolbar gob-chat-toolbar--search">
            <div class="gob-chat-toolbar_search">
                <input class="gob-chat-toolbar_search_input js-input" placeholder="Search chat…" />
                <button class="gob-chat-toolbar_button js-counter">0 / 0</button>
                <button class="gob-chat-toolbar_icon-button js-up" title="Previous match"><i class="fas fa-angle-up"></i></button>
                <button class="gob-chat-toolbar_icon-button js-down" title="Next match"><i class="fas fa-angle-down"></i></button>
                <button class="gob-chat-toolbar_icon-button js-reset" title="Reset search"><i class="fas fa-undo-alt"></i></button>
            </div>
        </div>

        <!-- Right-click menu for a single chat line. Positioned at the cursor by ChatEntryMenuControl;
             collapsed via .is-hidden when closed. The two group items show only on player lines and have
             their submenu buttons built at open time; .is-disabled grays the Remove item when the player
             is in no group. -->
        <div class="gob-chat-context-menu is-hidden">
            <button class="gob-chat-context-menu_item js-hide-toggle" data-action="hide">Hide Entry</button>
            <div class="gob-chat-context-menu_group js-add-group is-hidden">
                <button class="gob-chat-context-menu_item gob-chat-context-menu_item--parent">Add Player to Custom Group <i class="fas fa-angle-right"></i></button>
                <div class="gob-chat-context-menu_submenu js-add-submenu"></div>
            </div>
            <div class="gob-chat-context-menu_group js-remove-group is-hidden">
                <button class="gob-chat-context-menu_item gob-chat-context-menu_item--parent js-remove-parent">Remove Player from Custom Group <i class="fas fa-angle-right"></i></button>
                <div class="gob-chat-context-menu_submenu js-remove-submenu"></div>
            </div>
        </div>

        <!-- Resize affordances. Visible only while unlocked. Edges constrain to a
             single axis (top/bottom = height, left/right = width); the four corners
             do both. Cursors map to the host window-resize hit zones. -->
        <span class="gob-chat_resize gob-chat_resize--n"  aria-hidden="true"></span>
        <span class="gob-chat_resize gob-chat_resize--s"  aria-hidden="true"></span>
        <span class="gob-chat_resize gob-chat_resize--w"  aria-hidden="true"></span>
        <span class="gob-chat_resize gob-chat_resize--e"  aria-hidden="true"></span>
        <span class="gob-chat_resize gob-chat_resize--nw" aria-hidden="true" title="Drag to resize"></span>
        <span class="gob-chat_resize gob-chat_resize--ne" aria-hidden="true" title="Drag to resize"></span>
        <span class="gob-chat_resize gob-chat_resize--sw" aria-hidden="true" title="Drag to resize"></span>
        <span class="gob-chat_resize gob-chat_resize--se" aria-hidden="true" title="Drag to resize"></span>
    </div>
</body>
</html>
