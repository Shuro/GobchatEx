<html>
<head>
    <meta charset="utf-8" />
    <style>
        /* Shares the FFXIV Modern look of the chat overlay + settings window: IBM Plex Sans, a layered
           dark surface and a single gold accent (tokens copied from styles/config.scss / ffxiv_modern_chat).
           The host window is a fullscreen, transparent, click-through overlay on the primary monitor;
           everything here is positioned absolutely so the page itself never scrolls. */

        /* Vendored fonts (no CDN), same as the settings window. */
        @font-face { font-family:"IBM Plex Sans"; font-style:normal; font-weight:400; font-display:swap; src:url("/lib/fonts/ibm-plex/ibm-plex-sans-latin-400-normal.woff2") format("woff2"); }
        @font-face { font-family:"IBM Plex Sans"; font-style:normal; font-weight:500; font-display:swap; src:url("/lib/fonts/ibm-plex/ibm-plex-sans-latin-500-normal.woff2") format("woff2"); }
        @font-face { font-family:"IBM Plex Sans"; font-style:normal; font-weight:600; font-display:swap; src:url("/lib/fonts/ibm-plex/ibm-plex-sans-latin-600-normal.woff2") format("woff2"); }
        @font-face { font-family:"IBM Plex Sans"; font-style:normal; font-weight:700; font-display:swap; src:url("/lib/fonts/ibm-plex/ibm-plex-sans-latin-700-normal.woff2") format("woff2"); }

        :root {
            --ink:#e8eaee; --ink-2:#a0a7b4;
            --border:#2c303a;
            --gold:#e0a44e; --gold-2:#f0c074;
            --surface:rgba(23, 26, 32, 0.92);
            --shadow:0 28px 64px -18px rgba(0, 0, 0, .72);
            --font:"IBM Plex Sans", system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: var(--font);
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        /* Greeter: centered splash shown until GobchatEx is connected to FFXIV. */
        #gob-greeter {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            padding: 36px 56px;
            border-radius: 13px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            color: var(--ink);
            text-align: center;
            transition: opacity 0.35s ease;
        }

        #gob-greeter.gob-hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        /* Close (X) button, top-right of the splash; the host makes the overlay click-capturing while the
           greeter is visible (see AppModuleSystemOverlay.ApplyOverlayMode), so this click reaches the page. */
        #gob-greeter-close {
            position: absolute;
            top: 8px;
            right: 10px;
            width: 28px;
            height: 28px;
            padding: 0;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--ink-2);
            font-family: var(--font);
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            transition: color 0.15s ease, background 0.15s ease;
        }

        #gob-greeter-close:hover {
            color: var(--gold);
            background: rgba(255, 255, 255, 0.06);
        }

        #gob-greeter-close:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 2px;
        }

        #gob-greeter-title {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        #gob-greeter-title span {
            color: var(--gold);
        }

        #gob-greeter-status {
            font-size: 16px;
            font-weight: 500;
            color: var(--ink-2);
            max-width: 420px;
        }

        .gob-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.12);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: gob-spin 0.9s linear infinite;
        }

        @keyframes gob-spin {
            to { transform: rotate(360deg); }
        }

        /* Notifications: brief toasts in the top-right corner. */
        #gob-notifications {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .gob-toast {
            padding: 10px 16px;
            border-radius: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--gold);
            box-shadow: var(--shadow);
            color: var(--ink);
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(24px);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .gob-toast.gob-toast--show {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
    <script defer src="system.js"></script>
</head>
<body>
    <div id="gob-greeter">
        <button id="gob-greeter-close" type="button" aria-label="Quit GobchatEx" title="Quit GobchatEx">×</button>
        <div id="gob-greeter-title">Gobchat<span>Ex</span></div>
        <div class="gob-spinner"></div>
        <div id="gob-greeter-status" role="status" aria-live="polite">Searching FFXIV Process…</div>
    </div>
    <div id="gob-notifications" role="status" aria-live="polite"></div>
</body>
</html>
