<html>
<head>
    <meta charset="utf-8" />
    <style>
        /* The host window is a fullscreen, transparent, click-through overlay on the primary
           monitor; everything here is positioned absolutely so the page itself never scrolls. */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            user-select: none;
        }

        /* Greeter: centered splash shown until GobchatEx is connected to FFXIV. */
        #gob-greeter {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            padding: 36px 56px;
            border-radius: 12px;
            background: rgba(30, 30, 30, 0.82);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
            color: #ededed;
            text-align: center;
            transition: opacity 0.35s ease;
        }

        #gob-greeter.gob-hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        #gob-greeter-title {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        #gob-greeter-title span {
            color: #f0a020;
        }

        #gob-greeter-status {
            font-size: 16px;
            color: #c8c8c8;
            max-width: 420px;
        }

        .gob-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.18);
            border-top-color: #f0a020;
            border-radius: 50%;
            animation: gob-spin 0.9s linear infinite;
        }

        @keyframes gob-spin {
            to { transform: rotate(360deg); }
        }

        /* Notifications: brief toasts in the top-right corner. */
        #gob-notifications {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .gob-toast {
            padding: 10px 16px;
            border-radius: 8px;
            background: rgba(30, 30, 30, 0.9);
            border-left: 3px solid #f0a020;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            color: #ededed;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(24px);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .gob-toast.gob-toast--show {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
    <script defer src="system.js"></script>
</head>
<body>
    <div id="gob-greeter">
        <div id="gob-greeter-title">Gobchat<span>EX</span></div>
        <div class="gob-spinner"></div>
        <div id="gob-greeter-status">Searching FFXIV Process…</div>
    </div>
    <div id="gob-notifications"></div>
</body>
</html>
