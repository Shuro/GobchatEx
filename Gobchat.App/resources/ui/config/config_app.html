<div class="gx-page-wrap">
<div class="gob-config-page gx-page" id="cp-app">

    <div class="gx-page_head">
        <h1 data-gob-locale-text="config.app.page.name"></h1>
        <p data-gob-locale-text="config.app.page.desc"></p>
    </div>

    <!-- Appearance -->
    <section class="gx-section">
        <div class="gx-row">
            <div class="gx-row_label">
                <div>
                    <div class="gx-row_title" data-gob-locale-text="config.app.language"></div>
                    <div class="gx-row_desc" data-gob-locale-text="config.app.language.desc"></div>
                </div>
            </div>
            <div class="gx-row_control gx-sel-wrap">
                <select class="gx-sel" id="cp-app_language" data-gob-configkey="behaviour.language">
                    <option value="en">English</option>
                    <option value="de">Deutsch</option>
                </select>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </div>
        </div>
        <div class="gx-row">
            <div class="gx-row_label">
                <div>
                    <div class="gx-row_title" data-gob-locale-text="config.app.theme"></div>
                    <div class="gx-row_desc" data-gob-locale-text="config.app.theme.desc"></div>
                </div>
            </div>
            <div class="gx-row_control gx-sel-wrap">
                <select class="gx-sel" id="cp-app_theme" data-gob-configkey="style.theme"></select>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </div>
        </div>
    </section>

    <!-- Behaviour -->
    <div class="gx-eyebrow" data-gob-locale-text="config.app.ckblabel"></div>
    <section class="gx-section">
        <label class="gx-row gx-row--toggle">
            <div class="gx-row_label">
                <div>
                    <div class="gx-row_title"
                         data-gob-locale-text="config.app.ckb.autohide"
                         data-gob-locale-tooltip="config.app.ckb.autohide.tooltip"></div>
                    <div class="gx-row_desc" data-gob-locale-text="config.app.ckb.autohide.desc"></div>
                </div>
            </div>
            <input class="gx-tgl" type="checkbox"
                   id="cp-app_hide"
                   data-gob-configkey="behaviour.hideOnMinimize"
                   data-gob-locale-tooltip="config.app.ckb.autohide.tooltip" />
        </label>
        <label class="gx-row gx-row--toggle">
            <div class="gx-row_label">
                <div>
                    <div class="gx-row_title"
                         data-gob-locale-text="config.app.ckb.update"
                         data-gob-locale-tooltip="config.app.ckb.update.tooltip"></div>
                    <div class="gx-row_desc" data-gob-locale-text="config.app.ckb.update.desc"></div>
                </div>
            </div>
            <input class="gx-tgl" type="checkbox"
                   id="cp-app_checkupdates"
                   data-gob-configkey="behaviour.appUpdate.checkOnline"
                   data-gob-locale-tooltip="config.app.ckb.update.tooltip" />
        </label>
        <label class="gx-row gx-row--toggle gx-row--sub" data-enabled-by="cp-app_checkupdates">
            <div class="gx-row_label">
                <span class="gx-row_arrow">&#8627;</span>
                <div>
                    <div class="gx-row_title"
                         data-gob-locale-text="config.app.ckb.betaupdate"
                         data-gob-locale-tooltip="config.app.ckb.betaupdate.tooltip"></div>
                    <div class="gx-row_desc" data-gob-locale-text="config.app.ckb.betaupdate.desc"></div>
                </div>
            </div>
            <input class="gx-tgl" type="checkbox"
                   id="cp-app_checkbetaupdates"
                   data-gob-configkey="behaviour.appUpdate.acceptBeta"
                   data-gob-locale-tooltip="config.app.ckb.betaupdate.tooltip" />
        </label>
        <label class="gx-row gx-row--toggle">
            <div class="gx-row_label">
                <div>
                    <div class="gx-row_title">
                        <span data-gob-locale-text="config.app.ckb.actor"
                              data-gob-locale-tooltip="config.app.ckb.actor.tooltip"></span>
                        <span class="gx-badge-ok" id="cp-app_characterlocations_available"
                              data-gob-locale-text="config.app.ckb.actor.available" hidden></span>
                    </div>
                    <div class="gx-row_desc" data-gob-locale-text="config.app.ckb.actor.desc"></div>
                    <div class="gx-row_desc is-error" id="cp-app_characterlocations_feature"
                         data-gob-locale-text="config.app.ckb.actor.label" hidden></div>
                </div>
            </div>
            <input class="gx-tgl" type="checkbox"
                   id="cp-app_actor_updateActive"
                   data-gob-configkey="behaviour.actor.active"
                   data-gob-locale-tooltip="config.app.ckb.actor.tooltip" />
        </label>
    </section>

    <!-- Overlay window -->
    <div class="gx-eyebrow" data-gob-locale-text="config.app.position.lable"></div>
    <section class="gx-section gx-section--pad">
        <div class="gx-grid gx-grid--4" style="margin-bottom:16px">
            <div>
                <label class="gx-flabel" data-gob-locale-text="config.app.position.x" for="cp-app_frame_x"></label>
                <input class="gx-in" type="number" id="cp-app_frame_x" data-gob-configkey="behaviour.frame.chat.position.x" />
            </div>
            <div>
                <label class="gx-flabel" data-gob-locale-text="config.app.position.y" for="cp-app_frame_y"></label>
                <input class="gx-in" type="number" id="cp-app_frame_y" data-gob-configkey="behaviour.frame.chat.position.y" />
            </div>
            <div>
                <label class="gx-flabel" data-gob-locale-text="config.app.position.width" for="cp-app_frame_width"></label>
                <input class="gx-in" type="number" min="200" id="cp-app_frame_width" data-gob-configkey="behaviour.frame.chat.size.width" />
            </div>
            <div>
                <label class="gx-flabel" data-gob-locale-text="config.app.position.height" for="cp-app_frame_height"></label>
                <input class="gx-in" type="number" min="200" id="cp-app_frame_height" data-gob-configkey="behaviour.frame.chat.size.height" />
            </div>
        </div>
        <div class="gx-row" style="border-top:1px solid var(--border);padding-top:14px">
            <div class="gx-row_label">
                <div>
                    <div class="gx-row_title"
                         data-gob-locale-text="config.app.chatbox.backgroundcolor"
                         data-gob-locale-tooltip="config.app.chatbox.backgroundcolor.tooltip"></div>
                    <div class="gx-row_desc" data-gob-locale-text="config.app.chatbox.backgroundcolor.desc"></div>
                </div>
            </div>
            <div class="gx-row_control gx-inline">
                <input type="text"
                       id="cp-app_chat-history_backgroundcolor"
                       data-gob-configkey="style.chat-history.background-color"
                       data-gob-locale-tooltip="config.app.chatbox.backgroundcolor.tooltip" />
                <button id="cp-app_chat-history_backgroundcolor_reset" class="gx-icon" type="button"></button>
            </div>
        </div>
    </section>

    <!-- Multi-boxing -->
    <div class="gx-eyebrow" data-gob-locale-text="config.app.process.label"></div>
    <section class="gx-section gx-section--pad">
        <label class="gx-flabel"
               data-gob-locale-text="config.app.process.selector"
               data-gob-locale-tooltip="config.app.process.selector.tooltip"></label>
        <div class="gx-inline">
            <button class="gx-icon" id="cp-app_process_selector_refresh"
                    type="button" data-gob-locale-tooltip="config.main.button.refresh.tooltip">
                <i class="fas fa-sync-alt"></i>
            </button>
            <div class="gx-sel-wrap" style="flex:1">
                <select class="gx-sel gx-sel--block" type="text"
                        id="cp-app_process_selector"
                        data-gob-locale-tooltip="config.app.process.selector.tooltip">
                    <option value="-1" data-gob-locale-text="config.app.process.selector.default"></option>
                </select>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </div>
            <button class="gx-icon" id="cp-app_process_selector_link"
                    type="button" data-gob-locale-tooltip="config.app.process.link.tooltip">
                <i class="fas fa-link"></i>
            </button>
        </div>
        <div class="gx-status" id="cp-app_process_info" data-gob-locale-text="config.app.process.info.initialize"></div>
    </section>

    <!-- Search + Hotkey -->
    <div class="gx-grid gx-grid--2">
        <section class="gx-section gx-section--pad" style="margin-bottom:0">
            <div class="gx-card-title" data-gob-locale-text="config.app.search.label"></div>
            <label class="gx-flabel"
                   data-gob-locale-text="config.app.search.results"
                   data-gob-locale-tooltip="config.app.search.results.tooltip"></label>
            <div class="gx-inline" style="margin-bottom:13px">
                <input type="text"
                       id="cp-app_search_marked"
                       data-gob-configkey="style.chatsearch.marked.background-color"
                       data-gob-locale-tooltip="config.app.search.results.tooltip" />
                <button id="cp-app_search_marked_reset" class="gx-icon" type="button"></button>
            </div>
            <label class="gx-flabel"
                   data-gob-locale-text="config.app.search.border"
                   data-gob-locale-tooltip="config.app.search.border.tooltip"></label>
            <div class="gx-inline">
                <input type="text" class="gx-color--border"
                       id="cp-app_search_selected"
                       data-gob-configkey="style.chatsearch.selected.border-color"
                       data-gob-locale-tooltip="config.app.search.border.tooltip" />
                <button id="cp-app_search_selected_reset" class="gx-icon" type="button"></button>
            </div>
        </section>
        <section class="gx-section gx-section--pad" style="margin-bottom:0">
            <div class="gx-card-title" data-gob-locale-text="config.app.hotkeys.label"></div>
            <label class="gx-flabel" for="cp-app_hotkey_show"
                   data-gob-locale-text="config.app.hotkeys.hideshow"
                   data-gob-locale-tooltip="config.app.hotkeys.hideshow.tooltip"></label>
            <div class="gx-inline">
                <input class="gx-in gx-in--mono" type="text"
                       id="cp-app_hotkey_show"
                       data-gob-configkey="behaviour.hotkeys.showhide"
                       data-gob-locale-tooltip="config.app.hotkeys.hideshow.tooltip" />
                <button id="cp-app_hotkey_show_reset" class="gx-icon" type="button"></button>
            </div>
        </section>
    </div>

    <!-- Update intervals -->
    <div class="gx-eyebrow gx-eyebrow--gap" data-gob-locale-text="config.app.internal.label"></div>
    <section class="gx-section gx-section--pad">
        <div class="gx-grid gx-grid--2">
            <div>
                <label class="gx-flabel"
                       data-gob-locale-text="config.app.intervals.chat"
                       data-gob-locale-tooltip="config.app.intervals.chat.tooltip"></label>
                <div class="gx-inline">
                    <input class="gx-in" type="number" min="50" max="5000"
                           id="cp-app_chat_updateInterval"
                           data-gob-configkey="behaviour.chat.updateInterval"
                           data-gob-locale-tooltip="config.app.intervals.chat.tooltip" />
                    <button id="cp-app_chat_updateInterval_reset" class="gx-icon" type="button"></button>
                </div>
            </div>
            <div>
                <label class="gx-flabel"
                       data-gob-locale-text="config.app.intervals.actor"
                       data-gob-locale-tooltip="config.app.intervals.actor.tooltip"></label>
                <div class="gx-inline">
                    <input class="gx-in" type="number" min="200" max="20000"
                           id="cp-app_actor_updateInterval"
                           data-gob-configkey="behaviour.actor.updateInterval"
                           data-gob-locale-tooltip="config.app.intervals.actor.tooltip" />
                    <button id="cp-app_actor_updateInterval_reset" class="gx-icon" type="button"></button>
                </div>
            </div>
        </div>
    </section>

</div>
</div>

<script defer type="module" src="config_app.js"></script>
