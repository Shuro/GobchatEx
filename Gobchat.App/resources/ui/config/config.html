<!DOCTYPE html>

<html class="config-frame">

<head>
    <meta charset="utf-8" />
    <title>Gobconfig</title>

    <script>
        window.console = window.opener.console

        window.addEventListener('error', function (evt) {
            console.error(evt.error.stack);
        });

        window.GobchatAPI = window.opener.GobchatAPI
        window.Gobchat = window.opener.Gobchat
    </script>

    <link rel="stylesheet" href="/lib/coloris.min.css">
    <link rel="stylesheet" href="/styles/base.css">

    <script defer type="text/javascript" src="/lib/jquery-4.0.0.min.js"></script>
    <script defer type="text/javascript" src="/lib/lodash.min.js"></script>
    <script defer type="text/javascript" src="/lib/coloris.min.js"></script>
    <script defer type="text/javascript" src="/lib/fontawesome/js/all.js"></script>

    <!-- The active FFXIV theme is injected (by Style.activateStyles) immediately *before* this
         placeholder at runtime, so config.css must come *after* it to win the cascade over the
         theme's legacy .gob-* control styles on converted pages. -->
    <style id="gob_autogenerated_stylesheet"></style>
    <link rel="stylesheet" href="/styles/config.css">
    <script defer type="module" src="config.js"></script>
</head>
<body>
    <div class="gx-root" id="gob-config-root" data-theme="dark">

        <!-- Title bar (draggable region) -->
        <header class="gx-titlebar">
            <div class="gx-titlebar_brand">
                <div class="gx-titlebar_glyph">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#15100a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </div>
                <div class="gx-titlebar_titles">
                    <span class="gx-titlebar_name">GobchatEx</span>
                    <span class="gx-titlebar_sub" data-gob-locale-text="config.main.dialog.label"></span>
                </div>
            </div>
            <div class="gx-titlebar_actions">
                <button id="cp-main_titlebar-pin" class="gx-icon gx-icon--ghost" type="button"
                        data-gob-locale-tooltip="config.main.titlebar.pin">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"/><path d="M15 9.34V5a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1v4.34a2 2 0 0 1-.59 1.42L5 14h14l-3.41-3.24A2 2 0 0 1 15 9.34z"/></svg>
                </button>
                <button id="cp-main_titlebar-minimize" class="gx-icon gx-icon--ghost" type="button"
                        data-gob-locale-tooltip="config.main.titlebar.minimize">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg>
                </button>
                <button id="cp-main_titlebar-close" class="gx-icon gx-icon--ghost gx-icon--danger" type="button"
                        data-gob-locale-tooltip="config.main.titlebar.close">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>
        </header>

        <div class="gx-body">

            <!-- Navigation rail -->
            <aside class="gx-rail">
                <div class="gx-rail_profile">
                    <div class="gx-rail_profile-label" data-gob-locale-text="config.main.rail.activeprofile"></div>
                    <div class="gx-sel-wrap" style="display:block">
                        <select class="gob-config-navigation_selection gx-sel gx-sel--block" id="cp-main_profile-select"></select>
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                </div>

                <nav class="gob-config-navigation gx-nav-list gx-scroll"
                     data-gob-nav-target="cp-main_nav_content"
                     data-gob-nav-template="cp-main_nav_content_template">

                    <template id="cp-main_nav_content_template">
                        <div class="gob-config-navigation-panel_entry" data-gob-nav-panel></div>
                    </template>

                    <button class="gob-config-navigation_entry gx-nav is-active" type="button" data-gob-nav-target="config_app.html">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
                        <span data-gob-locale-text="config.app.page.name"></span>
                    </button>
                    <button class="gob-config-navigation_entry gx-nav" type="button" data-gob-nav-target="config_mentions.html">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/></svg>
                        <span data-gob-locale-text="config.mentions.page.name"></span>
                    </button>
                    <button class="gob-config-navigation_entry gx-nav" type="button" data-gob-nav-target="config_profiles.html">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        <span data-gob-locale-text="config.profiles.page.name"></span>
                    </button>
                    <button class="gob-config-navigation_entry gx-nav" type="button" data-gob-nav-target="config_channel.html">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
                        <span data-gob-locale-text="config.channel.page.name"></span>
                    </button>
                    <button class="gob-config-navigation_entry gx-nav" type="button" data-gob-nav-target="config_chatlog.html">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
                        <span data-gob-locale-text="config.chatlog.page.name"></span>
                    </button>
                    <button class="gob-config-navigation_entry gx-nav" type="button" data-gob-nav-target="config_rangefilter.html">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                        <span data-gob-locale-text="config.rangefilter.page.name"></span>
                    </button>
                    <button class="gob-config-navigation_entry gx-nav" type="button" data-gob-nav-target="config_formatting.html">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
                        <span data-gob-locale-text="config.formatting.page.name"></span>
                    </button>
                    <button class="gob-config-navigation_entry gx-nav" type="button" data-gob-nav-target="config_tabs.html">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="9" x2="9" y2="3"/></svg>
                        <span data-gob-locale-text="config.tabs.page.name"></span>
                    </button>
                    <button class="gob-config-navigation_entry gx-nav" type="button" data-gob-nav-target="config_groups.html">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        <span data-gob-locale-text="config.groups.page.name"></span>
                    </button>

                    <div class="gx-nav-divider"></div>

                    <button class="gob-config-navigation_entry gx-nav" type="button" data-gob-nav-target="about.html">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                        <span data-gob-locale-text="config.about.page.name"></span>
                    </button>
                    <button class="gob-config-navigation_entry gx-nav" type="button" data-gob-nav-target="config_debug.html">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                        <span>Debug</span>
                        <span class="gx-nav_badge">DEV</span>
                    </button>
                </nav>

                <div class="gx-rail_footer">
                    <div class="gx-rail_footer_row">
                        <button id="cp-main_save-config" class="gx-btn" type="button">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                            <span data-gob-locale-text="config.main.nav.save"></span>
                        </button>
                        <button id="cp-main_apply-config" class="gx-apply" type="button" data-gob-locale-tooltip="config.main.nav.apply">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                        </button>
                    </div>
                    <div class="gx-rail_footer_row">
                        <button id="cp-main_cancel-config" class="gx-ghost" type="button">
                            <span data-gob-locale-text="config.main.nav.cancel"></span>
                        </button>
                        <button id="cp-main_close-gobchat" class="gx-danger" type="button" data-gob-locale-tooltip="config.main.nav.closegobchat">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Page panel -->
            <main class="gx-main gx-scroll">
                <div id="cp-main_nav_content"></div>
            </main>
        </div>
    </div>
</body>
</html>
