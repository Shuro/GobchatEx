<div class="gx-page-wrap">
<div class="gob-config-page gx-page" id="cp-channel">

    <div class="gx-page_head">
        <h1 data-gob-locale-text="config.channel.page.name"></h1>
        <p data-gob-locale-text="config.channel.page.desc"></p>
    </div>

    <!-- Text-colour scheme: switches every channel's TEXT colour (sender/background untouched) to a
         preset and persists the choice; per-field reset then reverts to the selected scheme's colour. -->
    <section class="gx-section gx-section--pad">
        <div class="gx-scheme" role="group" data-gob-locale-tooltip="config.channel.scheme.tooltip">
            <button type="button" class="gx-scheme_btn" id="cp-channel_scheme-classic" data-scheme="classic"
                    data-gob-locale-text="config.channel.scheme.classic"></button>
            <button type="button" class="gx-scheme_btn" id="cp-channel_scheme-modern" data-scheme="modern"
                    data-gob-locale-text="config.channel.scheme.modern"></button>
        </div>
        <p class="gx-row_desc" style="margin-top:10px" data-gob-locale-text="config.channel.scheme.desc"></p>
    </section>

    <section class="gx-section gx-section--flush">
        <div class="gx-chtable_head">
            <div data-gob-locale-text="config.channel.tbl.channel.header.name"></div>
            <div data-gob-locale-text="config.channel.tbl.channel.header.sendercolor"></div>
            <div data-gob-locale-text="config.channel.tbl.channel.header.textcolor"></div>
            <div data-gob-locale-text="config.channel.tbl.channel.header.backgroundcolor"></div>
        </div>
        <div id="cp-channel_channel-table"></div>
    </section>

    <template id="cp-channel_template_channel-table_entry">
        <div class="gx-chrow">
            <label class="js-name gx-chrow_name"></label>
            <div class="gx-inline js-cell">
                <input class="js-color-sender" type="text" />
                <button class="gx-icon gx-icon--ghost js-color-sender-reset" type="button"></button>
            </div>
            <div class="gx-inline js-cell">
                <input class="js-color-text" type="text" />
                <button class="gx-icon gx-icon--ghost js-color-text-reset" type="button"></button>
            </div>
            <div class="gx-inline js-cell">
                <input class="js-color-background" type="text" />
                <button class="gx-icon gx-icon--ghost js-color-background-reset" type="button"></button>
            </div>
        </div>
    </template>
</div>
</div>

<script type="module" src="config_channel.js"></script>
